name: Build and Deploy Portfolio

on:
  push:
    branches: [ main ] # Triggers when you send files to your main branch

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Project Dependencies
        run: npm ci

      - name: Compile Production Build Assets
        run: npm run build

      - name: Deploy Production Code to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Deploys your built folder automatically
          branch: gh-pages
